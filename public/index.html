<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF a CSV/XLSX</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 mb-3">Convertidor PDF a CSV/XLSX</h1>
              <p class="text-muted mb-4">Sube un PDF, revisa y edita la tabla, y descarga el resultado.</p>

              <form id="upload-form" class="row g-3">
                <div class="col-12">
                  <label for="pdf-file" class="form-label">Archivo PDF</label>
                  <input class="form-control" type="file" id="pdf-file" accept="application/pdf" required />
                </div>
                <div class="col-12 col-md-6">
                  <label for="csv-delimiter" class="form-label">Delimitador CSV</label>
                  <select class="form-select" id="csv-delimiter">
                    <option value=",">Coma (,)</option>
                    <option value=";">Punto y coma (;)</option>
                  </select>
                </div>
                <div class="col-12 col-md-6">
                  <label for="output-format" class="form-label">Formato de salida</label>
                  <select class="form-select" id="output-format">
                    <option value="csv">CSV</option>
                    <option value="xlsx">XLSX</option>
                  </select>
                </div>
                <div class="col-12 d-flex gap-2">
                  <button id="process-btn" type="submit" class="btn btn-primary">Procesar PDF</button>
                  <button id="download-btn" type="button" class="btn btn-success" disabled>Descargar</button>
                </div>
              </form>

              <div id="status" class="alert d-none mt-4" role="alert"></div>

              <section id="progress-section" class="progress-white-zone mt-4 p-3 rounded border d-none">
                <video
                  id="cat-video"
                  class="cat-video mb-3"
                  autoplay
                  muted
                  loop
                  playsinline
                  preload="auto"
                >
                  <source src="assets/spincat.mp4" type="video/mp4" />
                </video>
                <div class="progress" role="progressbar" aria-label="Progreso de conversion" aria-valuemin="0" aria-valuemax="100">
                  <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%">0%</div>
                </div>
              </section>

              <section class="mt-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <h2 class="h5 mb-0">Vista previa editable</h2>
                  <button id="remove-empty-cols" type="button" class="btn btn-outline-secondary btn-sm" disabled>Eliminar columnas vacias</button>
                </div>
                <div id="table-wrap" class="table-responsive border rounded p-2 bg-light-subtle preview-area">
                  <p class="text-muted m-2" id="empty-preview">Aun no hay datos procesados.</p>
                </div>
              </section>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
